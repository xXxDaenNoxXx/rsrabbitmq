name: Build and Push Docker Image
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
 
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
 
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/msrabbitmq:latest .
 
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/msrabbitmq:latest
 
      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
 
      - name: Validate SSH Key
        run: |
          ssh-keygen -y -f ~/.ssh/id_rsa
 
      - name: Add EC2 to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
 
      - name: Deploy to EC2
        run: |
          # MODIFICADO: antes se hacia "docker run" manual, creando el contenedor
          # fuera de la red de docker-compose y sin las variables RABBITMQ_HOST/
          # PORT/USER/PASS ni S3_BUCKET_GUIAS_PROCESADAS (solo llevaba las de AWS).
          # Eso dejaba a msrabbitmq sin poder resolver el hostname "rabbitmq" y
          # cayendo al default "localhost", ademas de correr la imagen vieja
          # cacheada cuando el pull fallaba silenciosamente.
          #
          # Ahora se usa "docker compose pull/up": el contenedor se crea con
          # exactamente la config (red, env vars) definida una sola vez en
          # docker-compose.yml, sin duplicarla aqui.
          ssh -i ~/.ssh/id_rsa ec2-user@${{ secrets.EC2_HOST }} << 'EOF'
 
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
            -u "${{ secrets.DOCKERHUB_USERNAME }}" \
            --password-stdin
 
          # IMPORTANTE: ajusta esta ruta a donde vive tu docker-compose.yml en el EC2
          cd ~
 
          docker compose pull msrabbitmq
          docker compose up -d msrabbitmq
          EOF
