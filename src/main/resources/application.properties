spring.application.name=msrabbitmq

# MODIFICADO: puerto propio del microservicio de mensajeria (8080 lo usa ms-administracion-archivos)
server.port=8081

# MODIFICADO: host parametrizable por variable de entorno (antes estaba fijo en "localhost",
# lo que impide correrlo en Docker apuntando al contenedor de RabbitMQ)
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

# AGREGADO: bucket de respaldo si la guia no trae bucket propio en el mensaje
# (normalmente se reusa el mismo bucket que informa ms-administracion-archivos)
s3.bucket.guias-procesadas=${S3_BUCKET_GUIAS_PROCESADAS:guias-procesadas-default}

# AGREGADO: mismo tenant de Azure AD B2C que ms-administracion-archivos, para que ambos
# backends validen el mismo token entregado por el API Gateway
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://login.microsoftonline.com/7d6febd8-1893-4485-a002-1194f8dde63d/v2.0
